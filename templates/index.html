<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Study Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div class="hero-text">
          <p class="eyebrow">AI Study Assistant</p>
          <h1>Turn any PDF into a smart learning experience.</h1>
          <p class="subtitle">
            Upload a document and generate summaries, notes, quizzes, flashcards,
            interviews, study plans, and translations in seconds.
          </p>

          <div class="actions">
            <label class="upload-card" for="pdf-input">
              <span>📄 Upload PDF</span>
            </label>
            <input id="pdf-input" type="file" accept="application/pdf" hidden />
            <button id="theme-toggle" class="ghost-btn" type="button">🌙 Theme</button>
          </div>
        </div>

        <div class="hero-illustration">
          <div class="orb"></div>
          <div class="card glass">
            <h3>Study smarter</h3>
            <p>Personalized AI coaching for every chapter.</p>
          </div>
        </div>
      </header>

      <main>
        <section class="panel upload-panel">
          <label id="drop-zone" class="drop-zone" for="pdf-input">
            <p><strong>Drag and drop your PDF</strong></p>
            <p>or click to browse</p>
          </label>
          <div id="upload-meta" class="upload-meta"></div>
        </section>

        <section class="panel tools-panel">
          <div class="tool-grid">
            <button type="button" class="tool-btn" data-action="summary" disabled>🧠 Summary</button>
            <button type="button" class="tool-btn" data-action="notes" disabled>📝 Notes</button>
            <button type="button" class="tool-btn" data-action="flashcards" disabled>🃏 Flashcards</button>
            <button type="button" class="tool-btn" data-action="quiz" disabled>❓ Quiz</button>
            <button type="button" class="tool-btn" data-action="interview" disabled>🎤 Interview</button>
            <button type="button" class="tool-btn" data-action="plan" disabled>📅 Planner</button>
            <button type="button" class="tool-btn" data-action="translate" disabled>🌐 Translate</button>
            <button type="button" class="tool-btn" data-action="export" disabled>📤 Export</button>
          </div>
        </section>

        <section class="panel results-panel">
          <div id="status" class="status">Upload a PDF to start.</div>
          <div id="result-area" class="result-area"></div>
        </section>
      </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
